<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌲 林業・水産業クイズ</title>
<style>
  :root {
    --primary: #2E7D5A;
    --primary-dark: #1B5C3E;
    --secondary: #1A7BAB;
    --success: #5BAD72;
    --danger: #E74C3C;
    --card: #FFFFFF;
    --text: #333;
    --shadow: 0 8px 32px rgba(0,0,0,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    background: linear-gradient(135deg, #EDFAF2 0%, #EAF5FB 100%);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 16px; color: var(--text);
  }

  header { width: 100%; max-width: 500px; text-align: center; margin-bottom: 16px; }
  header h1 { font-size: 1.5rem; color: var(--primary); text-shadow: 1px 1px 0 rgba(0,0,0,0.08); }
  header p  { font-size: 0.85rem; color: #888; margin-top: 4px; }

  .progress-wrap { width: 100%; max-width: 500px; display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .progress-bar-bg { flex: 1; height: 12px; background: #E0E0E0; border-radius: 999px; overflow: hidden; }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    border-radius: 999px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }
  .progress-label { font-size: 0.8rem; color: #888; white-space: nowrap; }

  .score-chips { display: flex; gap: 8px; margin-bottom: 16px; }
  .chip { display: flex; align-items: center; gap: 4px; padding: 4px 12px; border-radius: 999px; font-size: 0.85rem; font-weight: bold; }
  .chip.correct { background: #E8F7EC; color: var(--success); }
  .chip.wrong   { background: #FDEDEC; color: var(--danger); }

  .card {
    width: 100%; max-width: 500px; background: var(--card);
    border-radius: 20px; box-shadow: var(--shadow);
    padding: 28px 24px 24px; position: relative;
  }
  .card.pop { animation: pop 0.3s ease; }
  @keyframes pop {
    0%   { transform: scale(0.95); opacity: 0; }
    100% { transform: scale(1);    opacity: 1; }
  }

  .badge {
    position: absolute; top: -10px; left: 20px;
    background: var(--primary); color: white;
    font-size: 0.7rem; font-weight: bold;
    padding: 3px 12px; border-radius: 999px; letter-spacing: 0.05em;
  }
  .q-number { font-size: 0.75rem; color: #aaa; margin-bottom: 6px; }
  .q-text { font-size: 1.05rem; font-weight: bold; line-height: 1.6; margin-bottom: 20px; min-height: 48px; }

  .q-diagram {
    background: #F0FBF5; border: 1.5px solid #A8D9BC;
    border-radius: 10px; padding: 12px 14px;
    font-size: 0.88rem; line-height: 1.7; margin-bottom: 16px;
    color: #1a4a30;
  }

  .choices { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .choice-btn {
    width: 100%; padding: 14px 18px;
    border: 2px solid #E0E0E0; border-radius: 12px;
    background: white; font-size: 0.95rem; text-align: left;
    cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; font-family: inherit;
  }
  .choice-btn:hover:not(:disabled) { border-color: var(--primary); background: #EDFAF2; transform: translateX(4px); }
  .choice-btn.selected-correct { border-color: var(--success); background: #E8F7EC; color: var(--success); font-weight: bold; }
  .choice-btn.selected-wrong   { border-color: var(--danger);  background: #FDEDEC; color: var(--danger);  font-weight: bold; }
  .choice-btn.show-correct     { border-color: var(--success); background: #E8F7EC; color: var(--success); }
  .choice-btn:disabled { cursor: default; }
  .choice-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 1.2rem; }

  .text-input-wrap { margin-bottom: 12px; }
  .text-input-wrap input {
    width: 100%; padding: 14px 16px;
    border: 2px solid #E0E0E0; border-radius: 12px;
    font-size: 1rem; outline: none; transition: border-color 0.2s; font-family: inherit;
  }
  .text-input-wrap input:focus   { border-color: var(--primary); }
  .text-input-wrap input.correct { border-color: var(--success); background: #E8F7EC; }
  .text-input-wrap input.wrong   { border-color: var(--danger);  background: #FDEDEC; }

  .hint-btn {
    display: inline-flex; align-items: center; gap: 5px;
    margin-top: 8px; margin-bottom: 4px; padding: 6px 14px;
    background: #FFFDE7; border: 1.5px dashed #F9A825; border-radius: 999px;
    font-size: 0.82rem; color: #E67E00; cursor: pointer; font-family: inherit;
    font-weight: bold; transition: background 0.2s;
  }
  .hint-btn:hover { background: #FFF8CC; }
  .hint-btn:disabled { opacity: 0.5; cursor: default; }
  .hint-reveal {
    display: none; margin-top: 6px; padding: 8px 12px;
    background: #FFFDE7; border-radius: 8px; font-size: 0.82rem; color: #8a6000;
    border-left: 3px solid #F9A825; animation: slideIn 0.25s ease;
  }
  .hint-reveal.show { display: block; }

  .feedback {
    display: none; padding: 14px 16px; border-radius: 12px;
    margin-bottom: 14px; font-size: 0.92rem; line-height: 1.6; animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .feedback.correct { background: #E8F7EC; color: #2E7D32; border-left: 4px solid var(--success); }
  .feedback.wrong   { background: #FDEDEC; color: #C0392B; border-left: 4px solid var(--danger); }
  .feedback.show { display: block; }
  .answer-line  { font-weight: bold; font-size: 1.0rem; }
  .explain-line { margin-top: 6px; font-size: 0.85rem; color: #555; }

  .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: all 0.2s; font-family: inherit; }
  .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; box-shadow: 0 4px 12px rgba(46,125,90,0.4); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(46,125,90,0.5); }
  .btn-secondary { background: var(--secondary); color: white; box-shadow: 0 4px 12px rgba(26,123,171,0.35); }
  .btn:disabled { opacity: 0.6; cursor: default; transform: none; }

  #result-screen {
    display: none; width: 100%; max-width: 500px;
    background: white; border-radius: 20px; box-shadow: var(--shadow);
    padding: 32px 24px; text-align: center; animation: pop 0.5s ease;
  }
  .result-emoji { font-size: 4rem; margin-bottom: 12px; }
  .result-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 8px; color: var(--primary); }
  .result-score { font-size: 3rem; font-weight: bold; color: var(--text); margin: 12px 0; }
  .result-score span { font-size: 1.2rem; color: #aaa; font-weight: normal; }
  .result-msg   { font-size: 0.95rem; color: #666; margin-bottom: 20px; line-height: 1.6; }
  .stars        { font-size: 2rem; letter-spacing: 4px; margin-bottom: 20px; }
  .result-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 0.85rem; text-align: left; }
  .result-table th { background: #F5F5F5; padding: 8px 12px; font-weight: bold; color: #555; }
  .result-table td { padding: 8px 12px; border-bottom: 1px solid #F0F0F0; }
  .result-table .ok  { color: var(--success); font-weight: bold; }
  .result-table .bad { color: var(--danger);  font-weight: bold; }

  #intro-screen {
    width: 100%; max-width: 500px;
    background: white; border-radius: 20px; box-shadow: var(--shadow);
    padding: 32px 24px; text-align: center;
  }
  .intro-emoji { font-size: 3.5rem; margin-bottom: 12px; }
  .intro-title { font-size: 1.4rem; font-weight: bold; color: var(--primary); margin-bottom: 8px; }
  .intro-sub   { color: #666; font-size: 0.9rem; margin-bottom: 20px; line-height: 1.7; }
  .intro-tags  { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 24px; }
  .tag { padding: 4px 12px; border-radius: 999px; font-size: 0.78rem; font-weight: bold; }
  .tag-green  { background: #EDFAF2; color: var(--primary); }
  .tag-blue   { background: #EAF5FB; color: var(--secondary); }
  .tag-yellow { background: #FFFDE7; color: #E67E00; }
</style>
</head>
<body>

<!-- ===== INTRO ===== -->
<div id="intro-screen">
  <div class="intro-emoji">🌲🐟</div>
  <div class="intro-title">林業・水産業クイズ</div>
  <div class="intro-sub">
    塾のテストから出題！<br>
    全<strong>17問</strong>に挑戦してみよう🔥<br>
    海流・漁業・森林のしくみをマスターしよう！
  </div>
  <div class="intro-tags">
    <span class="tag tag-green">🎯 全17問</span>
    <span class="tag tag-blue">⏱ 約5分</span>
    <span class="tag tag-yellow">📚 小4 社会</span>
  </div>
  <button class="btn btn-primary" onclick="startQuiz()">スタート！ 🚀</button>
</div>

<!-- ===== QUIZ ===== -->
<div id="quiz-screen" style="display:none; width:100%; max-width:500px;">
  <header>
    <h1>🌲🐟 林業・水産業クイズ</h1>
    <p>小4 社会 ｜ 11月テストより</p>
  </header>
  <div class="progress-wrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progress-label">0/17</div>
  </div>
  <div class="score-chips">
    <div class="chip correct">✅ 正解 <span id="correct-count">0</span></div>
    <div class="chip wrong">❌ ミス <span id="wrong-count">0</span></div>
  </div>
  <div class="card" id="quiz-card">
    <div class="badge" id="q-badge">大問1</div>
    <div class="q-number" id="q-number">問1 / 17</div>
    <div class="q-text" id="q-text"></div>
    <div id="diagram-wrap"></div>
    <div id="choices-wrap"></div>
    <div id="text-input-wrap" style="display:none">
      <div class="text-input-wrap">
        <input type="text" id="text-answer" placeholder="ここに答えを入力…" autocomplete="off">
        <button class="hint-btn" id="hint-btn" onclick="showHint()">💡 ヒントを見る</button>
        <div class="hint-reveal" id="hint-reveal"></div>
      </div>
      <button class="btn btn-secondary" id="submit-btn" onclick="submitText()" style="margin-bottom:12px;">答え合わせ ✔</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" style="display:none;">次の問題へ →</button>
  </div>
</div>

<!-- ===== RESULT ===== -->
<div id="result-screen">
  <div class="result-emoji" id="result-emoji">🎉</div>
  <div class="result-title">クイズ完了！</div>
  <div class="stars" id="result-stars">⭐⭐⭐</div>
  <div class="result-score" id="result-score">0<span> / 17点</span></div>
  <div class="result-msg" id="result-msg"></div>
  <table class="result-table">
    <thead><tr><th>#</th><th>問題</th><th>結果</th></tr></thead>
    <tbody id="result-tbody"></tbody>
  </table>
  <button class="btn btn-primary" onclick="restartQuiz()" style="margin-bottom:10px;">もう一度やる 🔄</button>
  <button class="btn btn-secondary" onclick="reviewWrong()" id="review-btn" style="margin-top:8px;">間違えた問題だけやる 📝</button>
</div>

<script>
const ALL_QUESTIONS = [
  // ===== 大問1：林業・海流 =====
  {
    id: 1, section: "大問1",
    text: "日本の国土面積のうち、森林が占める割合はおよそ何分の何ですか？",
    type: "choice",
    choices: ["3分の1", "3分の2", "4分の1", "4分の3"],
    answer: "3分の2",
    explanation: "日本の国土の約3分の2（約66%）が森林です。これは世界の中でもトップクラスの森林率で、フィンランドやスウェーデンに次ぐ水準です。"
  },
  {
    id: 2, section: "大問1",
    text: "森林の働きのうち、二酸化炭素を吸収して生物に必要な酸素をつくることを何といいますか？",
    type: "text",
    answer: "光合成",
    hint: "漢字3文字。「光」を使って「合成」する",
    explanation: "光合成（こうごうせい）は植物が太陽の光エネルギーを使い、二酸化炭素と水から酸素と養分（デンプン）をつくる働き。森林は「地球の肺」とも呼ばれます。"
  },
  {
    id: 3, section: "大問1",
    text: "植えた木の生育をさまたげる雑草を取り除く作業を何といいますか？",
    type: "text",
    answer: "下刈り",
    hint: "漢字3文字。草を「刈る」作業。木の「下」にある草を取り除く",
    explanation: "下刈り（したがり）は植林後に行う森林の手入れ作業。雑草が若い木に覆いかぶさって日光をさえぎるのを防ぎます。他にも「間伐」「枝打ち」などの作業があります。"
  },
  {
    id: 4, section: "大問1",
    text: "日本近海を流れる寒流（冷たい海流）は、親潮（千島海流）ともう一つは何ですか？",
    type: "choice",
    choices: ["対馬海流", "リマン海流", "黒潮", "メキシコ湾流"],
    answer: "リマン海流",
    explanation: "リマン海流は日本海を南下する寒流。千島海流（親潮）は太平洋側を南下します。この2つが日本近海の代表的な寒流です。"
  },
  {
    id: 5, section: "大問1",
    text: "日本近海を流れる暖流（温かい海流）は、黒潮（日本海流）ともう一つは何ですか？",
    type: "choice",
    choices: ["リマン海流", "対馬海流", "親潮", "千島海流"],
    answer: "対馬海流",
    explanation: "対馬海流（つしまかいりゅう）は日本海を北上する暖流。黒潮（くろしお）は太平洋側を北上します。この2つが日本近海の代表的な暖流です。"
  },
  {
    id: 6, section: "大問1",
    text: "寒流の親潮（千島海流）と暖流の黒潮（日本海流）がぶつかる三陸沖のよい漁場を何といいますか？",
    type: "text",
    answer: "潮目",
    hint: "漢字2文字。読み方は「しおめ」。別名「潮境」ともいう",
    explanation: "潮目（しおめ・潮境）は暖流と寒流がぶつかる境界。冷たい海流が深海の栄養豊富な水を持ち上げ、魚のえさとなるプランクトンが大量に発生するため、魚が集まる好漁場になります。"
  },
  // ===== 大問2：漁業の種類 =====
  {
    id: 7, section: "大問2",
    text: "陸地に近い海（沿岸部）で小型の船を使い、あじ・たい・たこなどをとる漁業を何といいますか？",
    type: "text",
    answer: "沿岸漁業",
    hint: "漢字4文字。「沿岸」（陸地に沿った海）で行う漁業",
    explanation: "沿岸漁業（えんがんぎょぎょう）は日帰りできる近くの海で行う漁業。小型の船を使い、地域の漁師が行います。漁獲量は少ないですが、新鮮な魚を水揚げできます。"
  },
  {
    id: 8, section: "大問2",
    text: "陸地から少し離れた海で中型の船を使い、いわし・さんま・さばなどをとる漁業を何といいますか？",
    type: "text",
    answer: "沖合漁業",
    hint: "漢字4文字。「沖合」（陸から少し離れた海）で行う漁業",
    explanation: "沖合漁業（おきあいぎょぎょう）は日本の排他的経済水域内の沖合で行う漁業。中型船で数日かけて漁をします。日本の漁獲量の中で最も多くを占めています。"
  },
  {
    id: 9, section: "大問2",
    text: "遠く離れた外国の海まで大型の船で出かけ、まぐろ・かつおなどをとる漁業を何といいますか？",
    type: "text",
    answer: "遠洋漁業",
    hint: "漢字4文字。「遠い海」まで出かけて行う漁業",
    explanation: "遠洋漁業（えんようぎょぎょう）は数か月かけて遠い海で行う漁業。200海里水域（排他的経済水域）の設定により1970年代以降に大幅に縮小しました。"
  },
  {
    id: 10, section: "大問2",
    text: "いけすや海の一定区域で魚や貝などを卵や稚魚から育て、出荷できる大きさになってからとる漁業を何といいますか？",
    type: "text",
    answer: "養殖漁業",
    hint: "漢字4文字。「養い育てる」漁業",
    explanation: "養殖漁業（ようしょくぎょぎょう）は魚・貝・海藻などを人工的に育てる漁業。かき・まだい・ぶりなどが盛ん。計画的に生産できる反面、エサ代や病気のリスクがあります。"
  },
  {
    id: 11, section: "大問2",
    text: "卵から育てた稚魚を一定の大きさになるまで育て、自然の海に放流してから後でとる漁業を何といいますか？",
    type: "text",
    answer: "栽培漁業",
    hint: "漢字4文字。田畑で農作物を「栽培」するように魚を育てる漁業",
    explanation: "栽培漁業（さいばいぎょぎょう）は稚魚を自然の海に放流して育てる漁業。成長してから漁をするため「海の畑」とも呼ばれます。養殖漁業と違い、海で自然に育てます。"
  },
  {
    id: 12, section: "大問2",
    text: "養殖漁業で「かき」の生産量が全国1位の都道府県はどこですか？",
    type: "choice",
    choices: ["愛媛県", "宮城県", "広島県", "岡山県"],
    answer: "広島県",
    diagram: "📊 かきの産地別割合\n広島 61.3% ／ 愛媛 13.2% ／ 宮城 7.5% ／ その他 18.0%",
    explanation: "広島県はかきの生産量が全国の約6割を占める最大産地。広島湾の穏やかな海と豊富なプランクトンがかきの養殖に最適です。「広島かき」はブランドとして有名です。"
  },
  {
    id: 13, section: "大問2",
    text: "養殖漁業で「のり」の生産量が全国1位の都道府県はどこですか？",
    type: "choice",
    choices: ["兵庫県", "福岡県", "佐賀県", "熊本県"],
    answer: "佐賀県",
    diagram: "📊 のりの産地別割合\n佐賀 25.9% ／ 兵庫 21.1% ／ 福岡 15.7% ／ その他 37.3%",
    explanation: "佐賀県（有明海）はのりの生産量が全国1位。有明海は干満の差が大きく、栄養豊富な泥が堆積しているため、のりの養殖に適した環境です。"
  },
  // ===== 大問3：林業（木材・間伐） =====
  {
    id: 14, section: "大問3",
    text: "杉（すぎ）やひのきのように、成長が早くまっすぐに幹が伸び、葉を一年中持つ樹木が集まった森林を何といいますか？",
    type: "text",
    answer: "針葉樹林",
    hint: "漢字5文字。葉が「針」のように細い樹木の森林",
    explanation: "針葉樹林（しんようじゅりん）は杉・ひのき・まつなどの針のように細い葉を持つ樹木の森。木材として利用しやすく、日本では植林によって多くの針葉樹林がつくられました。"
  },
  {
    id: 15, section: "大問3",
    text: "植えた木の本数を調整するために伐採された木から作られる木材を何といいますか？その工程の名前が使われています。",
    type: "text",
    answer: "間伐材",
    hint: "漢字3文字。「間伐」（木を間引くこと）から作られる木材",
    explanation: "間伐材（かんばつざい）は間伐（木を適度に伐採して残りの木を育てる作業）で出た木材。割りばし・割り箸・紙などに再利用されます。森林の手入れと資源の有効活用を両立できます。"
  },
  {
    id: 16, section: "大問3",
    text: "現在の日本の木材の自給率（国内で使う木材のうち国産が占める割合）はおよそ何%ですか？",
    type: "choice",
    choices: ["約20%", "約40%", "約60%", "約80%"],
    answer: "約40%",
    explanation: "日本の木材自給率は約40%（2020年代）。かつては10〜20%台まで落ち込んでいましたが、国産材の利用促進や林業の効率化により回復傾向にあります。残り約60%は輸入木材に頼っています。"
  },
  {
    id: 17, section: "大問3",
    text: "日本への木材の輸入先として、次のうち上位10か国に含まれない国はどれですか？",
    type: "choice",
    choices: ["ベトナム", "アメリカ合衆国", "メキシコ", "カナダ"],
    answer: "メキシコ",
    explanation: "日本の木材輸入先の上位はカナダ・アメリカ・フィンランド・スウェーデン・ベトナムなどです。メキシコは日本への木材輸出国の上位10か国には入りません。"
  }
];

// ==============================
// 状態管理
// ==============================
let questions = [];
let currentIndex = 0;
let correctCount = 0;
let wrongCount = 0;
let answered = false;
let results = [];

function startQuiz(questionSet) {
  questions = questionSet || [...ALL_QUESTIONS];
  currentIndex = 0; correctCount = 0; wrongCount = 0;
  results = []; answered = false;
  document.getElementById('intro-screen').style.display  = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display   = 'block';
  updateScore(); renderQuestion();
}

function renderQuestion() {
  const q = questions[currentIndex];
  answered = false;
  const card = document.getElementById('quiz-card');
  card.classList.remove('pop'); void card.offsetWidth; card.classList.add('pop');

  document.getElementById('q-badge').textContent  = q.section;
  document.getElementById('q-number').textContent = `問${currentIndex + 1} / ${questions.length}`;
  document.getElementById('q-text').textContent   = q.text;

  const dw = document.getElementById('diagram-wrap');
  dw.innerHTML = q.diagram
    ? `<div class="q-diagram">${q.diagram.replace(/\n/g,'<br>')}</div>`
    : '';

  const fb = document.getElementById('feedback');
  fb.className = 'feedback'; fb.innerHTML = '';
  document.getElementById('next-btn').style.display = 'none';

  const choicesWrap = document.getElementById('choices-wrap');
  const textWrap    = document.getElementById('text-input-wrap');

  if (q.type === 'choice') {
    textWrap.style.display = 'none'; choicesWrap.innerHTML = '';
    const div = document.createElement('div'); div.className = 'choices';
    [...q.choices].sort(() => Math.random() - 0.5).forEach(choice => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn'; btn.textContent = choice;
      btn.onclick = () => selectChoice(btn, choice, q);
      div.appendChild(btn);
    });
    choicesWrap.appendChild(div);
  } else {
    choicesWrap.innerHTML = ''; textWrap.style.display = 'block';
    const input = document.getElementById('text-answer');
    input.value = ''; input.className = ''; input.disabled = false;
    const hintBtn    = document.getElementById('hint-btn');
    const hintReveal = document.getElementById('hint-reveal');
    hintReveal.textContent = ''; hintReveal.classList.remove('show');
    if (q.hint) {
      hintBtn.style.display = 'inline-flex'; hintBtn.disabled = false;
      hintBtn.textContent = '💡 ヒントを見る';
    } else { hintBtn.style.display = 'none'; }
    document.getElementById('submit-btn').disabled = false;
    setTimeout(() => input.focus(), 100);
    input.onkeydown = (e) => { if (e.key === 'Enter') submitText(); };
  }
  updateProgress();
}

function showHint() {
  const q = questions[currentIndex];
  const hintBtn    = document.getElementById('hint-btn');
  const hintReveal = document.getElementById('hint-reveal');
  hintReveal.textContent = `💡 ヒント：${q.hint}`;
  hintReveal.classList.add('show');
  hintBtn.disabled = true; hintBtn.textContent = '💡 ヒントを見た';
}

function selectChoice(btn, choice, q) {
  if (answered) return;
  answered = true;
  const isCorrect = (choice === q.answer);
  if (isCorrect) correctCount++; else wrongCount++;
  results.push({ q, isCorrect, userAnswer: choice });
  updateScore();
  document.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent === q.answer) { b.classList.add('show-correct'); b.innerHTML += '<span class="choice-icon">✅</span>'; }
  });
  if (!isCorrect) {
    btn.className = 'choice-btn selected-wrong';
    btn.innerHTML = btn.textContent.replace('<span class="choice-icon">✅</span>', '') + '<span class="choice-icon">❌</span>';
  }
  showFeedback(isCorrect, q);
}

function submitText() {
  if (answered) return;
  const q = questions[currentIndex];
  const input = document.getElementById('text-answer');
  const userAns = input.value.trim();
  if (!userAns) { input.style.borderColor = 'orange'; setTimeout(() => input.style.borderColor = '', 500); return; }
  answered = true;
  document.getElementById('submit-btn').disabled = true; input.disabled = true;
  const normalize = s => s.replace(/\s/g, '').toLowerCase();
  const isCorrect = normalize(userAns) === normalize(q.answer) ||
    (q.altAnswers && q.altAnswers.some(a => normalize(userAns) === normalize(a)));
  if (isCorrect) { correctCount++; input.className = 'correct'; }
  else           { wrongCount++;   input.className = 'wrong'; }
  results.push({ q, isCorrect, userAnswer: userAns });
  updateScore(); showFeedback(isCorrect, q);
}

function showFeedback(isCorrect, q) {
  const fb = document.getElementById('feedback');
  fb.className = 'feedback ' + (isCorrect ? 'correct' : 'wrong') + ' show';
  fb.innerHTML = `
    <div class="answer-line">${isCorrect ? '🎉 正解！' : `❌ 不正解… 正解は「${q.answer}」`}</div>
    <div class="explain-line">📖 ${q.explanation}</div>
  `;
  document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
  if (currentIndex + 1 >= questions.length) showResult();
  else { currentIndex++; renderQuestion(); }
}

function updateProgress() {
  document.getElementById('progress-fill').style.width  = (currentIndex / questions.length * 100) + '%';
  document.getElementById('progress-label').textContent = `${currentIndex}/${questions.length}`;
}
function updateScore() {
  document.getElementById('correct-count').textContent = correctCount;
  document.getElementById('wrong-count').textContent   = wrongCount;
}

function showResult() {
  document.getElementById('quiz-screen').style.display   = 'none';
  document.getElementById('result-screen').style.display = 'block';
  const total = questions.length; const pct = correctCount / total;
  let emoji, stars, msg;
  if      (pct >= 0.9) { emoji='🏆'; stars='⭐⭐⭐'; msg='すごい！ほぼ満点！完璧な理解だね！このままのペースで頑張ろう✨'; }
  else if (pct >= 0.7) { emoji='😄'; stars='⭐⭐';  msg='よくできました！あと少しで満点。間違えた問題をもう一度確認しよう！'; }
  else if (pct >= 0.5) { emoji='😊'; stars='⭐';   msg='がんばった！半分以上正解できたよ。間違えた問題を復習して再チャレンジしよう！'; }
  else                  { emoji='💪'; stars='';    msg='まだ覚えていない部分があるね。焦らず一つずつ確認していこう！再挑戦してみよう。'; }
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-stars').textContent = stars;
  document.getElementById('result-score').innerHTML   = `${correctCount}<span> / ${total}問正解</span>`;
  document.getElementById('result-msg').textContent   = msg;
  const tbody = document.getElementById('result-tbody'); tbody.innerHTML = '';
  results.forEach((r, i) => {
    const tr = document.createElement('tr');
    const shortQ = r.q.text.length > 22 ? r.q.text.slice(0,22)+'…' : r.q.text;
    tr.innerHTML = `<td>${i+1}</td><td>${shortQ}</td><td class="${r.isCorrect?'ok':'bad'}">${r.isCorrect?'✅ 正解':'❌ '+r.q.answer}</td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('review-btn').style.display = results.some(r => !r.isCorrect) ? 'block' : 'none';
}

function restartQuiz() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('intro-screen').style.display  = 'block';
}
function reviewWrong() {
  const wrongQ = results.filter(r => !r.isCorrect).map(r => r.q);
  if (wrongQ.length > 0) startQuiz(wrongQ);
}
</script>
